<!-- card1 -->
<div
  class="relative bg-surface border border-[#ececec] hover:border-[var(--theme-blue)] transition-all duration-300 ease-in-out rounded-[.5rem] p-[1.5rem]"
>
  <h3
    class="text-theme-primary text-[1.125rem] font-[600] leading-none mb-[.25rem]"
  >
    Mobile First Corp
  </h3>
  <p class="text-text-secondary text-[1rem] font-[500] mb-[1.25rem]">
    React Native Developer
  </p>
  <button class="delete-job"
    class="absolute top-6 right-6 rounded-full border-2 border-[#ececec] w-8 h-8 text-text-secondary cursor-pointer"
  >
    <i class="fa-regular fa-trash-can"></i>
  </button>
  <ul
    class="list-disc flex gap-6 text-text-secondary text-[.875rem] font-[400] mb-[1.25rem]"
  >
    <li class="list-none">Remote</li>
    <li>Full-time</li>
    <li>$130,000 - $175,000</li>
  </ul>
  <button class="btn apply-status-btn mb-[.5rem]">NOT APPLIED</button>
  <p class="text-text-primary text-[.875rem] font-[400] mb-[1.25rem]">
    Build cross-platform mobile applications using React Native. Work on
    products used by millions of users worldwide.
  </p>
  <div class="flex gap-2">
    <button class="btn interview-action-btn">INTERVIEW</button>
    <button class="btn rejected-action-btn">REJECTED</button>
  </div>
</div>




<!-- empty card -->

  class="bg-surface border border-[#ececec] rounded-[.5rem] h-[25rem] flex items-center justify-center"
>
  <div class="flex flex-col items-center">
    <div class="w-[6.25rem] h-[6.25rem] object-cover mb-[1.25rem]">
      <img src="./jobs.png" alt="job document" />
    </div>
    <h3
      class="text-theme-primary text-[1.5rem] font-[600] leading-none mb-[.25rem]"
    >
      No jobs available
    </h3>
    <p class="text-text-secondary text-[1rem] font-[400]">
      Check back soon for new job opportunities
    </p>
  </div>
</div>
